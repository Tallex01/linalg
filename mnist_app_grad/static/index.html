<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MNIST Viewer</h1>
    <button id="load-btn">Load Random Digit</button>
    <div id="result" hidden>
        <div id="info-container">
            <p>Label (Actual): <span id="label"></span></p>
            <p>Prediction (Guessed): <span id="prediction"></span></p>
            <p id="smiley-container"><span id="smiley"></span></p>
        </div>
        <canvas id="canvas" width="28" height="28"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
